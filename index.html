<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Audi Carlsbad ROI Dashboard</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <style>
            * { box-sizing: border-box; }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #ffffff;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                position: relative;
                overflow: hidden;
            }

            /* Subtle gradient overlay */
            .staticrypt-content::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background: radial-gradient(ellipse at 50% 0%, rgba(187,0,0,0.04) 0%, transparent 60%);
                pointer-events: none;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 420px;
                padding: 20px;
                position: relative;
                z-index: 1;
            }

            .staticrypt-form {
                background: rgba(0,0,0,0.02);
                border: 1px solid rgba(0,0,0,0.08);
                backdrop-filter: blur(20px);
                border-radius: 16px;
                padding: 48px 40px;
                text-align: center;
            }

            /* Audi Carlsbad Logo */
            .audi-logo {
                max-width: 220px; height: auto; display: block;
                margin: 0 auto 28px;
                opacity: 0.9;
            }

            .staticrypt-instructions {
                margin-bottom: 32px;
            }

            .staticrypt-title {
                font-size: 1.1em;
                font-weight: 300;
                color: rgba(0,0,0,0.85);
                letter-spacing: 3px;
                text-transform: uppercase;
                margin: 0 0 6px;
            }

            .staticrypt-subtitle {
                font-size: 0.8em;
                font-weight: 400;
                color: rgba(0,0,0,0.4);
                letter-spacing: 1px;
                margin: 0;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid rgba(0,0,0,0.06);
                margin: 0 0 28px;
            }

            .staticrypt-password-container {
                position: relative;
                background: rgba(0,0,0,0.03);
                border: 1px solid rgba(0,0,0,0.12);
                border-radius: 10px;
                margin: 0 0 16px;
                transition: border-color 0.2s;
            }

            .staticrypt-password-container:focus-within {
                border-color: rgba(187,0,0,0.6);
                box-shadow: 0 0 0 3px rgba(187,0,0,0.1);
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: transparent;
                border: 0;
                font-family: 'Inter', sans-serif;
                font-size: 15px;
                font-weight: 400;
                color: #1a1a1a;
                outline: 0;
                padding: 14px 42px 14px 16px;
                width: 100%;
                letter-spacing: 0.5px;
            }

            .staticrypt-form input[type="password"]::placeholder {
                color: rgba(0,0,0,0.3);
                font-weight: 300;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.3;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(0);
                transition: opacity 0.2s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.6;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: #bb0000;
                width: 100%;
                border: 0;
                border-radius: 10px;
                padding: 14px;
                color: #ffffff;
                font-family: 'Inter', sans-serif;
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 2px;
                cursor: pointer;
                transition: all 0.2s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #d40000;
                transform: translateY(-1px);
                box-shadow: 0 4px 16px rgba(187,0,0,0.3);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(0);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
                color: rgba(0,0,0,0.4);
                font-size: 13px;
                font-weight: 300;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 8px;
                accent-color: #bb0000;
            }

            .staticrypt-error-message {
                color: #ff4444;
                font-size: 13px;
                margin-top: -8px;
                margin-bottom: 12px;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #ffffff;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.2em solid rgba(0,0,0,0.1);
                border-right-color: #bb0000;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            .login-footer {
                text-align: center;
                margin-top: 24px;
                font-size: 11px;
                color: rgba(0,0,0,0.2);
                letter-spacing: 0.5px;
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .staticrypt-form {
                    padding: 36px 28px;
                }
            }
        
            .staticrypt-remember { display: none !important; }
        </style>
        <script>document.addEventListener("DOMContentLoaded", function() {
            var cb = document.getElementById("staticrypt-remember");
            if (cb) { cb.checked = true; }
        });</script>
    </head>
